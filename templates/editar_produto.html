<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto - PetStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #222533; --accent: #5c4dff; --accent-hover: #4a3ecc; --success: #10b981; --bg-body: #f4f6f9; --border-color: #e2e8f0; --text-main: #333333; --text-muted: #64748b;}
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: var(--text-main);}
        .card { background: white; width: 100%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        h2 { margin-top: 0; color: var(--text-main); font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 22px;}
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .input-control { padding: 14px 16px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-size: 15px; outline: none; transition: 0.2s; font-family: inherit; font-weight: 500;}
        .input-control:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(92, 77, 255, 0.1); }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; transition: 0.2s; text-decoration: none; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box; font-family: inherit;}
        .btn-save { background: var(--accent); color: white; margin-bottom: 12px; margin-top: 10px;}
        .btn-save:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(92, 77, 255, 0.3); }
        .btn-cancel { background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border-color);}
        .btn-cancel:hover { background: #e2e8f0; color: var(--text-main);}
        
        @media(max-width: 600px) {
            .form-row { flex-direction: column; gap: 0 !important; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>✏️ Editar Produto</h2>
        <form method="POST">
            <div class="input-group">
                <label>Código SKU / Barras</label>
                <input type="text" name="sku" class="input-control" value="{{ p.codigo_sku }}" required style="background: #f8fafc;">
            </div>
            
            <div class="input-group">
                <label>Nome do Produto</label>
                <input type="text" name="nome" class="input-control" value="{{ p.nome }}" required>
            </div>
            
            <div class="form-row" style="display: flex; gap: 15px;">
                <div class="input-group" style="flex: 1;">
                    <label>Categoria</label>
                    <input type="text" name="categoria" class="input-control" value="{{ p.categoria }}" list="catList" required>
                    <datalist id="catList">
                        <option value="Rações"></option>
                        <option value="Acessórios"></option>
                        <option value="Farmácia"></option>
                        <option value="Higiene"></option>
                        <option value="Petiscos"></option>
                        <option value="Diversos"></option>
                    </datalist>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Qtd / Quilos (Estoque)</label>
                    <input type="text" name="quantidade" class="input-control" value="{{ "%.2f"|format(p.estoque)|replace('.', ',') }}" required>
                </div>
            </div>

            <div class="form-row" style="display: flex; gap: 15px;">
                <div class="input-group" style="flex: 1;">
                    <label>Preço de Custo (R$)</label>
                    <input type="text" name="preco_custo" class="input-control" value="{{ "%.2f"|format(p.preco_custo)|replace('.', ',') }}" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Preço de Venda (R$)</label>
                    <input type="text" name="preco" class="input-control" value="{{ "%.2f"|format(p.preco_venda)|replace('.', ',') }}" required>
                </div>
            </div>

            <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Salvar Alterações</button>
            <a href="/" class="btn btn-cancel">Cancelar e Voltar ao Estoque</a>
        </form>
    </div>
</body>
</html>
