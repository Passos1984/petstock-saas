<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Assinatura - PetStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-control { padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; text-decoration: none; text-align: center; display: block; box-sizing: border-box; }
        .btn-save { background: #4f46e5; color: white; margin-bottom: 10px; }
        .btn-cancel { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top: 0; color: #0f172a;">✏️ Editar Assinatura</h2>
        <form method="POST">
            <div class="input-group">
                <label>Nome Fantasia</label>
                <input type="text" name="nome_fantasia" value="{{ loja.nome_fantasia }}" class="input-control" required>
            </div>
            <div class="input-group">
                <label>Usuário de Login</label>
                <input type="text" name="usuario" value="{{ loja.usuario }}" class="input-control" required>
            </div>
            <div class="input-group">
                <label>Vencimento da Mensalidade</label>
                <input type="date" name="data_vencimento" value="{{ loja.data_vencimento.strftime('%Y-%m-%d') }}" class="input-control" required>
            </div>
            <button type="submit" class="btn btn-save">💾 Salvar Alterações</button>
            <a href="/admin_guilherme" class="btn btn-cancel">Cancelar</a>
        </form>
    </div>
</body>
</html>
