<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Assinatura - Agropet Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #222533; --accent: #3b82f6; --accent-hover: #2563eb; --bg-body: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; --border-color: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: var(--text-main);}
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border: 1px solid var(--border-color); }
        h2 { margin-top: 0; color: var(--text-main); font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;}
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .input-control { padding: 14px 16px; border: 1.5px solid var(--input-border, #cbd5e1); border-radius: 10px; font-size: 15px; outline: none; transition: 0.2s; font-family: inherit; font-weight: 500;}
        .input-control:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; text-decoration: none; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box; font-size: 15px; transition: 0.2s;}
        .btn-save { background: var(--accent); color: white; margin-bottom: 12px; }
        .btn-save:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3);}
        .btn-cancel { background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border-color);}
        .btn-cancel:hover { background: #e2e8f0; color: var(--text-main); }
    </style>
</head>
<body>
    <div class="card">
        <h2>✏️ Editar Assinatura</h2>
        <form method="POST">

            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="input-group">
                <label>Nome Fantasia</label>
                <input type="text" name="nome_fantasia" value="{{ loja.nome_fantasia }}" class="input-control" required>
            </div>
            <div class="input-group">
                <label>Usuário de Login</label>
                <input type="text" name="usuario" value="{{ loja.usuario }}" class="input-control" required style="text-transform: lowercase;">
            </div>
            <div class="input-group">
                <label>Vencimento da Mensalidade</label>
                <input type="date" name="data_vencimento" value="{{ loja.data_vencimento.strftime('%Y-%m-%d') }}" class="input-control" required>
            </div>

            <div class="input-group">
                <label style="color: #10b981;">Plano Contratado</label>
                <select name="plano" class="input-control" style="background: #ecfdf5; border-color: #10b981; font-weight: 700; color: #065f46;">
                    <option value="basico" {% if loja.plano == 'basico' %}selected{% endif %}>🥉 Básico (R$ 49,90) - Limite 1 Usuário</option>
                    <option value="pro" {% if loja.plano == 'pro' %}selected{% endif %}>🥈 PRO (R$ 80,00) - Limite 3 Usuários</option>
                    <option value="elite" {% if loja.plano == 'elite' %}selected{% endif %}>🥇 ELITE (R$ 150,00) - Completo e Ilimitado</option>
                </select>
            </div>

            <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Salvar Alterações</button>
            <a href="/admin_guilherme" class="btn btn-cancel">Cancelar e Voltar</a>
        </form>
    </div>
</body>
</html>
