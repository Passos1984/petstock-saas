<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetStock - PDV Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #222533; --accent: #5c4dff; --success: #10b981;
            --warning: #f59e0b; --danger: #ef4444; --bg-body: #f4f6f9;
            --text-main: #333333; --text-muted: #777777; --border-color: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body { display: flex; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); font-size: 13px; overflow: hidden;}

        /* Menu Lateral */
        aside { width: 250px; background: var(--primary); color: white; padding: 25px 20px; display: flex; flex-direction: column; z-index: 1002; flex-shrink: 0; transition: left 0.3s ease;}
        .logo { font-size: 18px; font-weight: 800; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px;}
        .menu-link { color: #a0a5ba; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .menu-link.active { background: var(--accent); color: white; }

        main { flex: 1; display: flex; flex-direction: column; padding: 20px; height: 100vh; overflow: hidden; }
        .pdv-grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; flex: 1; overflow: hidden; }

        /* ESQUERDA */
        .pdv-left { display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        .search-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); position: relative; }
        .search-box input { width: 100%; padding: 12px 15px; border: 2px solid var(--accent); border-radius: 10px; font-size: 15px; font-weight: 600; outline: none; }

        .cart-panel { background: white; border-radius: 12px; border: 1px solid var(--border-color); flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .cart-header { padding: 12px 15px; background: #f8fafc; border-bottom: 1px solid var(--border-color); font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .cart-scroll { flex: 1; overflow-y: auto; padding: 10px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 10px; color: var(--text-muted); text-transform: uppercase; padding: 8px; border-bottom: 1px solid var(--border-color); }
        td { padding: 12px 8px; border-bottom: 1px dashed var(--border-color); vertical-align: top;}

        .pdv-input-table { width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; font-weight: 600; outline: none; }

        /* BOTÕES */
        .btn { padding: 14px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-family: inherit;}
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: #f8fafc; color: var(--text-main); border: 1px solid var(--border-color); }

        /* DIREITA */
        .pdv-right { background: white; border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-y: auto; }
        .label-mini { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .pdv-select, .pdv-field { width: 100%; padding: 10px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-weight: 600; font-family: inherit; outline: none;}

        .total-box { background: var(--primary); color: white; padding: 15px 20px; border-radius: 12px; text-align: right; }
        .total-val { font-size: 36px; font-weight: 800; color: var(--success); display: block; margin-top: 2px;}

        .troco-box { background: #fffbeb; border: 2px dashed #f59e0b; color: #d97706; padding: 15px; border-radius: 10px; text-align: center; }
        #boxCashback { display: none; background: #eef2ff; border: 1px solid #c7d2fe; padding: 10px; border-radius: 8px; color: var(--accent); font-weight: 700; align-items: center; justify-content: space-between; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 30px; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #94a3b8; background: none; border: none; font-weight: bold;}

        @media (max-width: 991px) {
            .pdv-grid { grid-template-columns: 1fr; overflow: visible;}
            aside { position: fixed; left: -100%; top: 0; height: 100%; }
            aside.active { left: 0; }
        }
    </style>
</head>
<body>

    <input type="hidden" id="csrfTokenPDV" value="{{ csrf_token() }}">
    <input type="hidden" id="chavePixLoja" value="{{ loja_logada.chave_pix or '' }}">
    <input type="hidden" id="nomeFantasiaLoja" value="{{ loja_logada.nome_fantasia or 'PetStock' }}">

    <aside id="sidebar">
        <div style="text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" style="max-width: 160px; height: auto;">
        </div>
        <nav style="flex:1">
            <a href="/painel" class="menu-link">🏠 Dashboard</a>
            <a href="/estoque" class="menu-link">📦 Estoque</a>
            <a href="/clientes" class="menu-link">👥 Clientes</a>
            <a href="/pdv" class="menu-link active">🛒 PDV</a>
            <a href="/agenda" class="menu-link">🛁 Agenda</a>
            {% if cargo == 'Gerente' %}
            <a href="/marketing" class="menu-link">📣 Marketing</a>
            <a href="/relatorios" class="menu-link">📊 Financeiro</a>
            <a href="/comissoes" class="menu-link">✂️ Comissões</a>
            {% endif %}
        </nav>
        <a href="/logout" class="menu-link" style="color:#fca5a5">🚪 Sair</a>
    </aside>

    <main>
        <div class="pdv-grid">
            <div class="pdv-left">
                <div class="search-box">
                    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px;">
                        <div>
                            <label class="label-mini" style="color: var(--accent);">👤 Cliente (Nome ou Celular)</label>
                            <input type="text" id="cliente" placeholder="Consumidor Final" list="listaClientes" onchange="verificarCashback()">
                            <datalist id="listaClientes">
                                {% for c in clientes %}
                                <option value="{{ c.nome }}" data-id="{{ c.id }}">{{ c.telefone }}</option>
                                {% endfor %}
                            </datalist>
                        </div>
                        <div>
                            <label class="label-mini">📦 Buscar Produto (F2)</label>
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="buscaProduto" placeholder="Digite o nome ou bipe..." autocomplete="off" list="listaProdutos" oninput="verificarSelecao(this.value)" onkeyup="buscar(event)" style="flex: 1;">
                                <button onclick="abrirScanner()" class="btn btn-primary" title="Câmera">
                                    <i class="fas fa-camera"></i>
                                </button>
                            </div>
                            <datalist id="listaProdutos"></datalist>
                        </div>
                    </div>
                </div>

                <div class="cart-panel">
                    <div class="cart-header">
                        <span>🛒 CARRINHO</span>
                        <button onclick="limpar()" style="color:var(--danger); background:none; border:none; cursor:pointer;">🗑️ LIMPAR (F4)</button>
                    </div>
                    <div class="cart-scroll">
                        <table id="tabelaPDV">
                            <thead>
                                <tr>
                                    <th>PRODUTO</th>
                                    <th style="text-align:center;">QTD</th>
                                    <th style="text-align:center;">DESC</th>
                                    <th style="text-align:right;">TOTAL</th>
                                    <th style="text-align:center;">X</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div style="padding: 15px; background: #f8fafc;">
                        <button class="btn btn-primary" style="width: 100%;" onclick="irParaPagamento()">➡️ PAGAMENTO (F3)</button>
                    </div>
                </div>
            </div>

            <div class="pdv-right">
                <label class="label-mini">Vendedor</label>
                <select id="vendedor" class="pdv-select">
                    {% for f in equipe %}<option value="{{ f.nome }}">{{ f.nome }}</option>{% endfor %}
                    <option>Dono/Gerente</option>
                </select>

                <div id="boxCashback">
                    <span style="font-size: 11px;">💼 Cashback:</span>
                    <span id="valorCashback">R$ 0,00</span>
                </div>

                <div style="background: #f8fafc; padding: 15px; border-radius: 12px;">
                    <label class="label-mini">Forma de Pagamento</label>
                    <select id="pagamento1" class="pdv-select" onchange="calcular()">
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Pix">Pix</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="Crediário / Fiado">Crediário / Fiado</option>
                        <option value="Saldo Cashback">🎁 Saldo Cashback</option>
                    </select>
                    <input type="text" id="valorPag1" class="pdv-field" placeholder="0,00" oninput="calcular()">
                </div>

                <div class="total-box">
                    <span class="label-mini" style="color:#a0a5ba;">Total a Pagar</span>
                    <span class="total-val" id="totalFinal">R$ 0,00</span>
                </div>

                <div class="troco-box">
                    <div style="font-size: 10px; font-weight: 800;">⚠️ TROCO</div>
                    <div id="trocoTxt" style="font-size: 20px; font-weight: 800;">R$ 0,00</div>
                </div>

                <button class="btn btn-success" style="height: 60px;" onclick="finalizar()">💰 FINALIZAR (F8)</button>
            </div>
        </div>
    </main>

    <div id="modalRecibo" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 style="color: var(--success);">✅ Venda OK!</h2>
            <button class="btn" style="background: #25D366; color: white; width: 100%; margin-bottom: 10px;" onclick="whatsRecibo()">📱 Enviar no WhatsApp</button>
            <button class="btn btn-outline" style="width: 100%;" onclick="fecharRecibo()">⏭️ Nova Venda</button>
        </div>
    </div>

    <div id="modalScanner" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="fecharScanner()">&times;</button>
            <div id="reader"></div>
        </div>
    </div>

    <script>
        let catalogo = []; let carrinho = []; let ultimaVendaSalva = {}; let saldoAtualCliente = 0.0; let total_da_venda_atual = 0;

        window.onload = () => { carregarEstoque(); document.getElementById('buscaProduto').focus(); };

        function carregarEstoque() {
            fetch('/api/produtos').then(r => r.json()).then(d => {
                catalogo = d;
                let dl = document.getElementById('listaProdutos'); dl.innerHTML = '';
                catalogo.forEach(p => { dl.innerHTML += `<option value="${p.sku}">${p.nome} - R$ ${p.preco.toFixed(2)}</option>`; });
            });
        }

        function verificarSelecao(val) {
            let p = catalogo.find(x => x.sku === val);
            if (p) { add(p); document.getElementById('buscaProduto').value = ''; }
        }

        function buscar(e) {
            if (e.key === 'Enter') {
                let t = e.target.value.toLowerCase();
                let p = catalogo.find(x => x.sku.toLowerCase() === t || x.nome.toLowerCase().includes(t));
                if(p) { add(p); e.target.value = ''; }
            }
        }

        function add(p) {
            let item = carrinho.find(i => i.id === p.id);
            if (item) item.qtd++; else carrinho.push({...p, qtd: 1, desc_un: 0, dias: 0});
            render();
        }

        function render() {
            let tbody = document.querySelector('#tabelaPDV tbody'); tbody.innerHTML = '';
            carrinho.forEach((item, idx) => {
                let totalItem = (item.preco - item.desc_un) * item.qtd;
                tbody.innerHTML += `<tr>
                    <td><b>${item.nome}</b></td>
                    <td><input type="number" class="pdv-input-table" value="${item.qtd}" oninput="update(${idx}, 'qtd', this)"></td>
                    <td><input type="number" class="pdv-input-table" value="${item.desc_un}" oninput="update(${idx}, 'desc_un', this)"></td>
                    <td style="text-align:right; font-weight:800;">R$ ${totalItem.toFixed(2)}</td>
                    <td style="text-align:center;"><button onclick="remove(${idx})">&times;</button></td>
                </tr>`;
            });
            calcular();
        }

        function update(idx, field, el) { carrinho[idx][field] = parseFloat(el.value) || 0; calcular(); }
        function remove(idx) { carrinho.splice(idx, 1); render(); }
        function limpar() { carrinho = []; render(); }

        function calcular() {
            let total = carrinho.reduce((a, b) => a + ((b.preco - b.desc_un) * b.qtd), 0);
            total_da_venda_atual = total;
            document.getElementById('totalFinal').innerText = 'R$ ' + total.toFixed(2);
        }

        function irParaPagamento() { document.getElementById('valorPag1').value = total_da_venda_atual.toFixed(2); document.getElementById('valorPag1').focus(); }

        function finalizar() {
            if(carrinho.length === 0) return;
            let clienteNome = document.getElementById('cliente').value;
            let clienteTelefone = "";
            let options = document.getElementById('listaClientes').options;
            for(let i=0; i<options.length; i++){ if(options[i].value === clienteNome) clienteTelefone = options[i].text; }

            ultimaVendaSalva = {
                itens: [...carrinho],
                total: document.getElementById('totalFinal').innerText,
                cliente: clienteNome || 'Consumidor Final',
                telefone: clienteTelefone,
                pagamento: document.getElementById('pagamento1').value,
                data: new Date().toLocaleString()
            };

            const dados = {
                cliente_nome: clienteNome,
                vendedor_nome: document.getElementById('vendedor').value,
                forma_pagamento: document.getElementById('pagamento1').value,
                itens: carrinho.map(i => ({ id: i.id, qtd: i.qtd, subtotal_final: (i.preco - i.desc_un) * i.qtd }))
            };

            fetch('/api/finalizar_venda', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.getElementById('csrfTokenPDV').value },
                body: JSON.stringify(dados)
            }).then(r => r.json()).then(res => { if(res.sucesso) document.getElementById('modalRecibo').style.display = 'flex'; });
        }

        function whatsRecibo() {
            let t = `🐾 *PETSTOCK - COMPROVANTE*\n\n📅 *Data:* ${ultimaVendaSalva.data}\n👤 *Cliente:* ${ultimaVendaSalva.cliente}\n\n*ITENS:*\n`;
            ultimaVendaSalva.itens.forEach(i => { t += `▪️ ${i.qtd}x ${i.nome} - R$ ${((i.preco - i.desc_un) * i.qtd).toFixed(2)}\n`; });
            t += `\n💰 *TOTAL: ${ultimaVendaSalva.total}*\n💳 Pgto: ${ultimaVendaSalva.pagamento}\n\n🙏 Obrigado! 🐶\n`;

            // ✅ CIRURGIA: PESQUISA DE SATISFAÇÃO PARA TODOS
            t += `\n➖➖➖➖➖➖➖➖\n⭐ *PESQUISA DE SATISFAÇÃO*\nComo foi sua experiência conosco hoje?\nResponda com uma nota de *1 a 5*! Sua opinião é muito importante! 💙`;

            let link = `https://api.whatsapp.com/send?text=${encodeURIComponent(t)}`;
            if (ultimaVendaSalva.telefone) {
                let num = ultimaVendaSalva.telefone.replace(/\D/g, '');
                if (num.length >= 10) link = `https://api.whatsapp.com/send?phone=55${num}&text=${encodeURIComponent(t)}`;
            }
            window.open(link, '_blank'); fecharRecibo();
        }

        function fecharRecibo() { document.getElementById('modalRecibo').style.display = 'none'; limpar(); }
        function abrirScanner() { document.getElementById('modalScanner').style.display='flex'; }
        function fecharScanner() { document.getElementById('modalScanner').style.display='none'; }
    </script>
</body>
</html>
