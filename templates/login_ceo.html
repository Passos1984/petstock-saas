<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Master CEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 380px; text-align: center; border-top: 5px solid #3b82f6; }
        .input-control { width: 100%; padding: 15px; margin: 25px 0; border: 1px solid #334155; border-radius: 12px; background: #0f172a; color: white; outline: none; text-align: center; font-size: 18px; letter-spacing: 4px; box-sizing: border-box;}
        .btn { padding: 16px; border: none; border-radius: 12px; font-weight: 800; color: white; background: #3b82f6; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #2563eb; transform: scale(1.02); }
        .alert { padding: 12px; background: #7f1d1d; color: #fca5a5; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin:0;">🔒 Área do CEO</h2>
        <p style="color:#94a3b8; font-size:14px; margin-top:10px;">Introduza a Chave Mestre do PetStock</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <input type="password" name="senha_mestre" class="input-control" required autofocus>
            <button type="submit" class="btn">Desbloquear Painel</button>
        </form>
    </div>
</body>
</html>
