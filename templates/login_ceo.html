<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Master Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border-top: 5px solid #3b82f6; text-align: center; }
        .input-control { width: 100%; padding: 15px; margin-top: 20px; margin-bottom: 20px; border: 1px solid #334155; border-radius: 10px; box-sizing: border-box; font-family: inherit; font-size: 16px; background: #0f172a; color: white; outline: none; text-align: center; letter-spacing: 2px; }
        .input-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 800; color: white; background: #3b82f6; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .alert { padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: 700; font-size: 14px; background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin: 0; font-size: 24px;">🔒 Acesso Restrito</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-top: 10px;">Área exclusiva do CEO PetStock.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert">{{ message | safe }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="password" name="senha_mestre" class="input-control" placeholder="Digite a Senha Mestre" required autofocus>
            <button type="submit" class="btn">Desbloquear Painel</button>
        </form>
    </div>
</body>
</html>
