<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetStock - Nova Palavra-passe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #5c4dff; --primary: #222533; }
        body { font-family: 'Inter', sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .input-control { width: 100%; padding: 14px; border: 1.5px solid #cbd5e1; border-radius: 10px; outline: none; box-sizing: border-box;}
        .input-control:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0;">🛡️ Segurança</h2>
        <p style="color:#64748b; font-size:14px; margin-bottom:30px;">A sua conta está com a palavra-passe padrão. Por favor, crie uma nova senha agora.</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for msg in messages %}<div style="color:red; font-size:13px; margin-bottom:15px;">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>Nova Palavra-passe</label>
                <input type="password" name="nova_senha" class="input-control" required>
            </div>
            <div class="input-group">
                <label>Confirmar Palavra-passe</label>
                <input type="password" name="confirma_senha" class="input-control" required>
            </div>
            <button type="submit" class="btn">Salvar e Entrar</button>
        </form>
    </div>
</body>
</html>
