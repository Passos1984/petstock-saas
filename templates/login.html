<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetStock - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #222533; --accent: #5c4dff; --bg-body: #f4f6f9; --text-main: #333333; --text-muted: #64748b; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); padding: 20px; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .logo-area { margin-bottom: 30px; }
        .logo-area img { max-width: 180px; height: auto; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 8px; }
        .input-control { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .input-control:focus { border-color: var(--accent); background: #fcfcff; }
        .btn-login { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(92, 77, 255, 0.3); }
        .alert { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; font-weight: 600; line-height: 1.5; }
        .alert-danger { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .alert-warning { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
        .hint { font-size: 12px; color: var(--text-muted); margin-top: 15px; display: block; background: #f8fafc; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="PetStock Logo">
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message | safe }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="input-group">
                <label>Utilizador</label>
                <input type="text" name="login" class="input-control" required placeholder="O seu nome de acesso">
            </div>
            <div class="input-group">
                <label>Palavra-passe</label>
                <input type="password" name="senha" class="input-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>

        <span class="hint">💡 Primeiro acesso? Utilize a senha <b>123456</b></span>
    </div>
</body>
</html>
