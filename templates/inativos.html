<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetStock - Lixeira</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #222533; --accent: #5c4dff; --bg-body: #f4f6f9; --text-muted: #64748b; --danger: #ef4444; --success: #10b981;}
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); margin: 0; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 800px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--text-muted); font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .btn-restore { background: var(--success); color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 12px;}
    </style>
</head>
<body>
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 style="margin:0; font-size:22px;">♻️ Produtos Inativos (Lixeira)</h1>
            <a href="/" style="color:var(--accent); font-weight:700; text-decoration:none;">⬅️ Voltar</a>
        </div>
        
        {% if produtos %}
        <table>
            <thead><tr><th>Produto</th><th>Estoque Congelado</th><th style="text-align:right;">Ação</th></tr></thead>
            <tbody>
                {% for p in produtos %}
                <tr>
                    <td><span style="text-decoration:line-through; color:var(--text-muted);">{{ p.nome }}</span></td>
                    <td>{{ p.estoque }}</td>
                    <td style="text-align:right;"><a href="/restaurar_produto/{{ p.id }}" class="btn-restore">✅ Restaurar</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div style="text-align:center; padding:50px; color:var(--text-muted);">A lixeira está vazia. ✨</div>
        {% endif %}
    </div>
</body>
</html>
